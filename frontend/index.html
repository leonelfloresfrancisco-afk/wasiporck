<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WasiPorck — La Casa de los Cerditos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">WasiPorck</div>
            <ul>
                <li><a href="#">Catálogo</a></li>
                <li><a href="/admin">Administración</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Catálogo de Productos y Ejemplares</h2>
        <div id="contenedor-productos" class="grid-productos">Cargando inventario...</div>
    </main>

    <section class="form-box">
        <h2>Formulario de Compra</h2>
        <div class="form-group">
            <label>Nombre y Apellido:</label>
            <input type="text" id="cli-nom" placeholder="Ej. Juan Pérez">
        </div>
        <div class="form-group">
            <label>Celular / WhatsApp:</label>
            <input type="text" id="cli-tel" placeholder="Ej. 912345678">
        </div>
        <div class="form-group">
            <label>Dirección de Envío:</label>
            <textarea id="cli-dir" rows="2" placeholder="Ej. Jr. Dos de Mayo 123, Pachas"></textarea>
        </div>
        <button onclick="enviarPedidoWhatsApp(document.getElementById('cli-nom').value, document.getElementById('cli-tel').value, document.getElementById('cli-dir').value)">
            Procesar Orden vía WhatsApp
        </button>
    </section>

    <div class="bottom-nav">
        <button onclick="window.scrollTo(0,0)">Volver Arriba</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
